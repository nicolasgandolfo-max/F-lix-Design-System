worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    gzip on;
    gzip_types text/html application/javascript text/css application/json image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /healthz {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Vite/Storybook hashed chunks — safe to cache forever.
        location ^~ /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Storybook manager story index — unhashed; must not be immutable or new
        # stories disappear until a hard refresh (browser keeps stale JSON for 1y).
        location = /index.json {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }

        location = /stories.json {
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }

        # Other static extensions at repo root (favicons, etc.). JSON omitted on purpose.
        location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location / {
            add_header Cache-Control "no-cache";
            try_files $uri $uri/ /index.html;
        }
    }
}
