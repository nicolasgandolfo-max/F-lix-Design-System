<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" fill="none">
  <!-- Bottom bill -->
  <rect x="4" y="32" width="72" height="20" rx="4" fill="#35605F"/>
  <rect x="4" y="32" width="72" height="4" rx="0" fill="#2a4d4c"/>
  <circle cx="40" cy="42" r="6" fill="#2a4d4c" opacity="0.4"/>
  <circle cx="40" cy="42" r="3" fill="#60D06F" opacity="0.5"/>

  <!-- Middle bill -->
  <rect x="4" y="22" width="72" height="20" rx="4" fill="#60D06F"/>
  <rect x="4" y="22" width="72" height="4" rx="0" fill="#4ab85a"/>
  <circle cx="40" cy="32" r="6" fill="#4ab85a" opacity="0.4"/>
  <circle cx="40" cy="32" r="3" fill="#082422" opacity="0.2"/>
  <!-- Dollar sign -->
  <text x="40" y="36" text-anchor="middle" font-size="8" font-weight="700" fill="#082422" opacity="0.4" font-family="sans-serif">$</text>

  <!-- Top bill -->
  <rect x="4" y="12" width="72" height="20" rx="4" fill="#82e08f"/>
  <rect x="4" y="12" width="72" height="4" rx="0" fill="#60D06F"/>
  <circle cx="40" cy="22" r="6" fill="#60D06F" opacity="0.5"/>
  <circle cx="40" cy="22" r="3" fill="#082422" opacity="0.2"/>
  <!-- Dollar sign -->
  <text x="40" y="26" text-anchor="middle" font-size="8" font-weight="700" fill="#082422" opacity="0.5" font-family="sans-serif">$</text>
  <!-- Corner details -->
  <text x="12" y="26" font-size="6" fill="#082422" opacity="0.4" font-family="sans-serif">100</text>
  <text x="60" y="26" font-size="6" fill="#082422" opacity="0.4" font-family="sans-serif">100</text>
</svg>
