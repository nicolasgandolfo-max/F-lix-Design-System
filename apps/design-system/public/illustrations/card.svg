<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 56" fill="none">
  <!-- Back card -->
  <rect x="12" y="8" width="56" height="36" rx="5" fill="#6060BF" transform="rotate(-6 12 8)"/>
  <!-- Middle card -->
  <rect x="8" y="12" width="56" height="36" rx="5" fill="#2BF2F1" transform="rotate(-2 8 12)"/>
