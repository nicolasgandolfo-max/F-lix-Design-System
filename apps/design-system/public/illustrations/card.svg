  <!-- Card number dots -->
  <circle cx="30" cy="42" r="2" fill="#2BF2F1" opacity="0.6"/>
  <circle cx="37" cy="42" r="2" fill="#2BF2F1" opacity="0.6"/>
  <circle cx="44" cy="42" r="2" fill="#2BF2F1" opacity="0.6"/>
  <circle cx="51" cy="42" r="2" fill="#2BF2F1" opacity="0.6"/>
