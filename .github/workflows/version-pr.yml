name: Prepare Release (Version PR)

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: version-pr
  cancel-in-progress: false

jobs:
  version:
    name: Create version bump PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run changeset version
        run: npm run version

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No pending changesets — nothing to version."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(release): version packages"
          title: "chore(release): version packages"
          body: |
            This PR was automatically created by the **Prepare Release** workflow.

            It applies pending changesets: bumps `@felix/ui` version in `package.json` and updates `CHANGELOG.md`.

            **Merge to `main`** to trigger the publish workflow.
          branch: changeset-release/main
          base: main
          delete-branch: true
          labels: release
